<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    
    <title>👨‍💻 Jatin</title>
    <meta name="description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies. Available for freelance and full-time opportunities." />
    <meta name="keywords" content="full stack developer, react developer, nodejs, portfolio, web developer" />
    <meta name="author" content="Jatin" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourportfolio.com" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourportfolio.com" />
    <meta property="og:title" content="Your Name | Full Stack Developer" />
    <meta property="og:description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies." />
    <meta property="og:image" content="https://yourportfolio.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@yourhandle" />
    <meta name="twitter:title" content="Your Name | Full Stack Developer" />
    <meta name="twitter:description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies." />
    <meta name="twitter:image" content="https://yourportfolio.com/og-image.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e8490f" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Your Name",
      "url": "https://yourportfolio.com",
      "sameAs": [
        "https://github.com/yourusername",
        "https://linkedin.com/in/yourusername",
        "https://instagram.com/yourusername"
      ],
      "jobTitle": "Full Stack Developer",
      "description": "Full Stack Developer specializing in React, Node.js, and modern web technologies."
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
